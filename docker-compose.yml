services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: datium-backend
    restart: unless-stopped
    env_file:
      - ./.env

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: datium-frontend
    restart: unless-stopped
    environment:
      PHP_BACKEND_BASE_URL: "http://backend/"
      BACKEND_PUBLIC_BASE_URL: "/legacy/"
      NODE_ENV: "production"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      CHAT_BILLING_DETERMINISTIC: "${CHAT_BILLING_DETERMINISTIC:-0}"
    depends_on:
      - backend

  proxy:
    image: nginx:1.27-alpine
    container_name: datium-proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
